[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gazedeck"
version = "0.1.0"
description = "Plane-relative gaze bridge over WebSocket (fixation.* + mark)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "websockets>=12,<13",
  "pydantic>=2,<3",
  "numpy>=1.26,<2",
  "pywebview>=5.0,<6"
]

# optional extras you can install later: pip install -e ".[neon]"
[project.optional-dependencies]
neon = [
  "pupil-labs-realtime-api>=2.3",
  "pupil-labs-real-time-screen-gaze>=0.2"
]
dev = [
  "ruff>=0.5",            # optional linter/formatter
  "pytest>=8"             # optional tests
]

[project.scripts]
gazedeck = "gazedeck.main:main"
